<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rex大叔投資研究工作站 v1.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF8F5;--bg2:#F5F1EB;--bg3:#EBE6DE;--white:#FFFFFF;
  --text:#4A3F33;--text2:#6B6156;--text3:#8A7E6E;--text4:#B0A898;
  --border:#E8E3DB;--border2:#D4C5B0;
  --accent:#8B7355;--accent-light:#E8DFD2;
  --red:#C44B4B;--green:#4A8A4A;--blue:#4A6A8A;
  --warn-bg:#F5EDE0;--warn-text:#8A6B3E;
  --info-bg:#E8EDF5;--info-text:#4A5A7A;
  --ok-bg:#E8F0E8;--ok-text:#4A7A4A;
  --danger-bg:#F5E8E8;--danger-text:#8A4A4A;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;background:#E8E3DB;color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.app{width:100vw;height:100vh;max-width:1440px;max-height:900px;background:var(--bg);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
@media(min-width:1441px){.app{border:0.5px solid var(--border)}}
@media(max-height:901px){.app{max-height:100vh;border-radius:0}}

.titlebar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0}
.dots{display:flex;gap:6px}.dots span{width:10px;height:10px;border-radius:50%}
.dot-r{background:#E8A0A0}.dot-y{background:#E8CFA0}.dot-g{background:#A0C8A0}
.tabs{display:flex;background:var(--bg3);border-radius:var(--radius);padding:2px}
.tab{padding:6px 22px;font-size:14px;color:var(--text3);border-radius:6px;cursor:pointer;transition:all .15s;user-select:none}
.tab.active{color:var(--text);background:var(--white);font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
.tab:hover:not(.active){color:var(--text2);background:rgba(255,255,255,0.3)}

.subtitle{display:flex;align-items:center;padding:7px 16px;border-bottom:0.5px solid var(--border);background:var(--bg);flex-shrink:0;gap:8px}
.subtitle .title{font-size:15px;font-weight:500;color:var(--text)}
.subtitle .meta{font-size:12px;color:var(--text4)}

.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:210px;border-right:0.5px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sb-section{padding:6px 10px}
.sb-label{font-size:11px;font-weight:500;color:var(--text4);letter-spacing:0.5px;padding:6px 8px 4px;text-transform:uppercase}
.sb-item{padding:8px 10px;font-size:13px;color:var(--text2);border-radius:6px;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:6px;margin-bottom:1px}
.sb-item:hover{background:rgba(255,255,255,0.5)}
.sb-item.active{background:var(--white);color:var(--text);box-shadow:0 0.5px 1px rgba(0,0,0,0.04)}
.sb-item .icon{font-size:13px;width:18px;text-align:center}
.sb-small{padding:6px 10px;font-size:12px;color:var(--text3);cursor:pointer;border-radius:4px;margin-bottom:1px}
.sb-small:hover{color:var(--text2);background:rgba(255,255,255,0.3)}
.sb-user{margin-top:auto;padding:10px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--text)}

/* Chat */
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--white);min-width:0}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px}
.chat-messages::-webkit-scrollbar{width:4px}.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{margin-bottom:14px;display:flex}.msg.user{justify-content:flex-end}
.msg .bubble{max-width:75%;padding:10px 14px;font-size:15px;line-height:1.7}
.msg.user .bubble{background:var(--bg2);color:var(--text);border-radius:14px 14px 4px 14px}
.msg.sys{flex-direction:column}
.msg.sys .sys-header{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.msg.sys .sys-avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center}
.msg.sys .sys-label{font-size:12px;color:var(--text4)}
.msg.sys .bubble{background:var(--bg);border:0.5px solid var(--border);border-radius:4px 14px 14px 14px;max-width:90%}

.data-card{margin-top:8px}
.data-card .card-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:400}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 18px;font-size:14px}
.data-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border)}
.data-row .label{color:var(--text4)}.data-row .value{color:var(--text);font-weight:500}
.data-section{margin-top:10px;padding-top:8px;border-top:0.5px solid var(--border)}
.data-section .section-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px}

.mini-table{font-size:13px;width:100%}
.mini-table .thead{display:grid;gap:4px;color:var(--text4);padding-bottom:4px;border-bottom:0.5px solid var(--border)}
.mini-table .trow{display:grid;gap:4px;color:var(--text);padding:3px 0;border-bottom:0.5px solid rgba(232,227,219,0.5)}
.mini-table .trow:last-child{border-bottom:none}

.chat-input{border-top:0.5px solid var(--border);padding:10px 16px;background:var(--white);flex-shrink:0}
.input-wrap{display:flex;align-items:center;gap:8px;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:8px 12px;transition:border-color .15s}
.input-wrap:focus-within{border-color:var(--border2)}
.input-wrap input{flex:1;border:none;background:transparent;outline:none;font-size:15px;color:var(--text);font-family:inherit}
.input-wrap input::placeholder{color:var(--text4)}
.btn-query{background:var(--border2);color:var(--white);padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:background .15s;white-space:nowrap}
.btn-query:hover{background:var(--accent)}

/* Right panel */
.right-panel{width:230px;border-left:0.5px solid var(--border);background:var(--bg);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.right-panel::-webkit-scrollbar{width:4px}.right-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.rp-section{padding:10px 12px;border-bottom:0.5px solid var(--border)}
.rp-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px}
.rp-item{display:flex;align-items:center;gap:6px;padding:5px 0;cursor:pointer;font-size:12px;color:var(--text2)}
.rp-item:hover{color:var(--text)}
.rp-card{border-radius:var(--radius);padding:9px 11px;margin-bottom:6px;font-size:12px}
.rp-card .card-t{font-weight:500;margin-bottom:2px}.rp-card .card-d{font-size:10px}
.rp-warn{background:var(--warn-bg)}.rp-warn .card-t{color:var(--warn-text)}.rp-warn .card-d{color:#A68B5B}
.rp-info{background:var(--info-bg)}.rp-info .card-t{color:var(--info-text)}.rp-info .card-d{color:#6B7A9A}
.rp-ok{background:var(--ok-bg)}.rp-ok .card-t{color:var(--ok-text)}.rp-ok .card-d{color:#6B9A6B}
.rp-danger{background:var(--danger-bg)}.rp-danger .card-t{color:var(--danger-text)}.rp-danger .card-d{color:#9A6B6B}
.ctx-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:var(--text2)}
.ctx-icon{width:18px;height:18px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px}

.footer{padding:6px;background:var(--bg2);border-top:0.5px solid var(--border);text-align:center;font-size:11px;color:var(--text4);flex-shrink:0}

.price-up{color:var(--red)}.price-down{color:var(--green)}.price-flat{color:var(--text3)}

.welcome{text-align:center;padding:60px 20px;color:var(--text3)}
.welcome .emoji{font-size:36px;margin-bottom:12px}
.welcome .wtitle{font-size:18px;font-weight:500;color:var(--text);margin-bottom:6px}
.welcome .desc{font-size:14px;line-height:1.6}
.welcome .hints{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
.welcome .hint{font-size:13px;padding:5px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:16px;cursor:pointer;color:var(--text2);transition:all .12s}
.welcome .hint:hover{background:var(--bg2);color:var(--text)}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--bg);border-radius:var(--radius);padding:8px 10px}
.stat-card .stat-label{font-size:12px;color:var(--text4);margin-bottom:2px}
.stat-card .stat-value{font-size:18px;font-weight:500}

.article-group{margin-bottom:4px}
.article-cat{display:flex;align-items:center;gap:4px;padding:4px 0;cursor:pointer;font-size:11px;color:var(--text2)}

.stock-info{font-size:14px}
.stock-info .info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border)}
.stock-info .info-row .label{color:var(--text4);min-width:70px;flex-shrink:0}
.stock-info .info-row .value{color:var(--text);font-weight:500;text-align:right;word-break:break-word}
.stock-info .info-full{padding:6px 0;border-bottom:0.5px solid var(--border)}
.stock-info .info-full .label{color:var(--text4);font-size:12px;margin-bottom:2px}
.stock-info .info-full .value{color:var(--text);font-size:13px;line-height:1.5}

.rp-section .rp-title{cursor:pointer;user-select:none}
.rp-section .rp-title:hover{color:var(--accent)}
.rp-section .rp-body{overflow:hidden;transition:max-height .2s ease}
@media(max-width:900px){.sidebar{width:180px}.right-panel{width:200px}}
@media(max-width:768px){.sidebar,.right-panel{display:none}.app{border-radius:0;max-height:100vh}}
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
    <div class="tabs">
      <div class="tab" data-tab="stock" onclick="switchTab('stock')">股價</div>
      <div class="tab active" data-tab="cb" onclick="switchTab('cb')">CB價格</div>
      <div class="tab" data-tab="cbas" onclick="switchTab('cbas')">CBAS</div>
    </div>
    <div style="font-size:11px;color:var(--text4)">v1.0</div>
  </div>

  <div class="subtitle">
    <span class="title" id="subtitle-title">CB 可轉債價格查詢</span>
    <span id="breadcrumb" style="font-size:12px;color:var(--text3);margin-left:8px"></span>
    <span class="meta" id="subtitle-meta" style="margin-left:auto"></span>
  </div>

  <div class="main">
    <!-- Left Sidebar - 會隨Tab切換 -->
    <div class="sidebar">
      <div id="sidebar-content"></div>
      <div class="sb-section">
        <div class="sb-label">最近查詢</div>
        <div id="recent-list"></div>
      </div>
      <div class="sb-user">
        <div class="sb-avatar">R</div>
        <div><div style="font-size:11px;font-weight:500">Rex大叔</div><div style="font-size:10px;color:var(--text4)">研究工作站</div></div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-messages" id="chat-messages">
        <div class="welcome" id="welcome">
          <div class="emoji"><svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="44" height="44" rx="10" fill="#F5F1EB" stroke="#D4C5B0" stroke-width="1.5"/><polyline points="12,36 20,28 26,32 34,20 42,24" fill="none" stroke="#C44B4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="12,32 20,34 26,30 34,26 42,30" fill="none" stroke="#4A8A4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/><circle cx="34" cy="20" r="3" fill="#C44B4B"/><line x1="12" y1="40" x2="42" y2="40" stroke="#D4C5B0" stroke-width="1"/><line x1="12" y1="14" x2="12" y2="40" stroke="#D4C5B0" stroke-width="1"/></svg></div>
          <div class="wtitle">Rex大叔投資研究工作站</div>
          <div class="desc">輸入 CB 代號、股票代號或名稱開始查詢<br>所有相關資料一次呈現</div>
          <div class="hints" id="welcome-hints"></div>
        </div>
      </div>
      <div class="chat-input">
        <div class="input-wrap">
          <span style="font-size:16px;color:var(--text4);cursor:pointer">+</span>
          <input type="text" id="query-input" placeholder="輸入代號或名稱查詢..." onkeydown="if(event.key==='Enter')doQuery()">
          <span style="font-size:10px;color:var(--text4);background:var(--bg3);padding:3px 8px;border-radius:4px;white-space:nowrap">Opus 4.6</span>
          <button class="btn-query" onclick="doQuery()">查詢</button>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="rp-section" id="yt-panel">
        <div class="rp-title" style="display:flex;justify-content:space-between"><span>▶ YouTube 影片</span><span style="font-size:10px;color:var(--text4)" id="yt-count"></span></div>
        <div id="yt-list"></div>
      </div>
      <div class="rp-section" id="articles-panel">
        <div class="rp-title" style="display:flex;justify-content:space-between" onclick="toggleRpSection(this)"><span><span class="rp-arrow">▸</span> 方格子文章</span><span style="font-size:10px;color:var(--text4)" id="articles-count"></span></div><div id="articles-list" style="display:none"></div>
      </div>
      <div class="rp-section" id="knowledge-panel">
        <div class="rp-title" style="display:flex;justify-content:space-between" onclick="toggleRpSection(this)"><span><span class="rp-arrow">▸</span> 研究發現</span><span style="font-size:10px;color:var(--text4);cursor:pointer" onclick="event.stopPropagation();cycleKnowledge()">切換 →</span></div><div id="knowledge-cards" style="display:none"></div>
      </div>
      <div class="rp-section" id="course-progress">
        <div class="rp-title" onclick="toggleRpSection(this)"><span class="rp-arrow">▸</span> 120篇研究系列</div><div id="course-list" style="display:none"></div>
      </div>
      <div class="rp-section">
        <div class="rp-title" onclick="toggleRpSection(this)"><span class="rp-arrow">▸</span> Context</div><div id="ctx-body" style="display:none"><div style="font-size:10px;color:var(--text4);margin-bottom:6px">已連接資料庫</div>
        <div class="ctx-item"><div class="ctx-icon">📊</div><span id="ctx-cb">CB 資料庫 (載入中...)</span></div>
        <div class="ctx-item"><div class="ctx-icon">💰</div><span id="ctx-cbas">CBAS 拆解 (載入中...)</span></div>
        <div class="ctx-item"><div class="ctx-icon">📈</div><span id="ctx-stock">股價資料 (載入中...)</span></div>
        <div class="ctx-item"><div class="ctx-icon">🎯</div><span id="ctx-auction">競拍資料 (載入中...)</span></div>
        <div id="db-stats" style="margin-top:8px;font-size:10px;color:var(--text4)"></div></div>
      </div>
    </div>
  </div>

  <div class="footer">Rex大叔投資研究工作站 — 資料僅供研究參考，不構成任何投資建議 — 投資有風險，CBAS最大損失為權利金歸零</div>
</div>
<script>
// ========== 全域變數 ==========
// ========== 工具函數 ==========
function fmtDate(d){if(!d)return'-';var s=String(d);return s.length===8?s.slice(0,4)+'/'+s.slice(4,6)+'/'+s.slice(6,8):s;}
function fmtNum(n,dec){if(n===null||n===undefined||isNaN(n))return'-';return Number(n).toFixed(dec===undefined?2:dec);}
function fmtMoney(n){if(!n||isNaN(n))return'-';var v=Number(n);if(v>=1e8)return(v/1e8).toFixed(1)+'\u5104';if(v>=1e4)return(v/1e4).toFixed(0)+'\u842c';return v.toLocaleString();}
function priceClass(c){if(!c||isNaN(c))return'price-flat';return Number(c)>0?'price-up':Number(c)<0?'price-down':'price-flat';}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scrollToBottom(){var c=document.getElementById('chat-messages');setTimeout(function(){c.scrollTop=c.scrollHeight},50);}

var DB = null, currentTab = 'cb', currentFn = 'basic', recentQueries = [], knowledgeCatIndex = 0;


function renderChipAnalysis(code, html_ref) {
  var html = '';
  
  // 融資融券
  if (window.MARGIN_2026) {
    var mg = MARGIN_2026.filter(function(r){return r.c===code}).sort(function(a,b){return b.d-a.d});
    if (mg.length > 0) {
      html += '<div class="data-section"><div class="section-title">\u7c4c\u78bc\u5206\u6790\uff1a\u878d\u8cc7\u878d\u5238</div>';
      
      // 摘要：最近一日 vs 5日前 vs 20日前
      var latest = mg[0];
      var d5 = mg.length > 5 ? mg[4] : null;
      var d20 = mg.length > 20 ? mg[19] : null;
      
      html += '<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">';
      // 融資餘額卡片
      var mrChange5 = d5 ? (latest.mr||0) - (d5.mr||0) : null;
      var mrChange20 = d20 ? (latest.mr||0) - (d20.mr||0) : null;
      html += '<div style="flex:1;min-width:120px;background:var(--bg);border-radius:8px;padding:8px 10px">';
      html += '<div style="font-size:11px;color:var(--text4)">\u878d\u8cc7\u9918\u984d</div>';
      html += '<div style="font-size:16px;font-weight:500">' + ((latest.mr||0)/1000).toFixed(0) + '<span style="font-size:11px;color:var(--text4)"> \u5343\u5f35</span></div>';
      if (mrChange5 !== null) html += '<div style="font-size:10px" class="' + (mrChange5>0?'price-up':'price-down') + '">5\u65e5 ' + (mrChange5>0?'+':'') + mrChange5 + '</div>';
      if (mrChange20 !== null) html += '<div style="font-size:10px" class="' + (mrChange20>0?'price-up':'price-down') + '">20\u65e5 ' + (mrChange20>0?'+':'') + mrChange20 + '</div>';
      html += '</div>';
      
      // 融券餘額卡片
      var srChange5 = d5 ? (latest.sr||0) - (d5.sr||0) : null;
      html += '<div style="flex:1;min-width:120px;background:var(--bg);border-radius:8px;padding:8px 10px">';
      html += '<div style="font-size:11px;color:var(--text4)">\u878d\u5238\u9918\u984d</div>';
      html += '<div style="font-size:16px;font-weight:500">' + (latest.sr||0) + '<span style="font-size:11px;color:var(--text4)"> \u5f35</span></div>';
      if (srChange5 !== null) html += '<div style="font-size:10px" class="' + (srChange5>0?'price-up':'price-down') + '">5\u65e5 ' + (srChange5>0?'+':'') + srChange5 + '</div>';
      html += '</div>';
      html += '</div>';
      
      // 明細表
      html += '<div class="mini-table"><div class="thead" style="grid-template-columns:70px 50px 50px 60px 50px 50px 55px"><span>\u65e5\u671f</span><span>\u8cc7\u8cb7</span><span>\u8cc7\u8ce3</span><span>\u8cc7\u9918\u984d</span><span>\u5238\u8cb7</span><span>\u5238\u8ce3</span><span>\u5238\u9918\u984d</span></div>';
      mg.slice(0,15).forEach(function(r){
        var mbClass = (r.mb||0) > (r.ms||0) ? 'price-up' : (r.mb||0) < (r.ms||0) ? 'price-down' : '';
        html += '<div class="trow" style="grid-template-columns:70px 50px 50px 60px 50px 50px 55px">';
        html += '<span>'+fmtDate(r.d)+'</span>';
        html += '<span class="price-up">'+(r.mb||'-')+'</span>';
        html += '<span class="price-down">'+(r.ms||'-')+'</span>';
        html += '<span style="font-weight:500">'+(r.mr||'-')+'</span>';
        html += '<span class="price-up">'+(r.sb||'-')+'</span>';
        html += '<span class="price-down">'+(r.ss||'-')+'</span>';
        html += '<span style="font-weight:500">'+(r.sr||'-')+'</span></div>';
      });
      html += '</div></div>';
    }
  }
  
  // 借券
  if (window.SBL_2026) {
    var sbl = SBL_2026.filter(function(r){return r.c===code}).sort(function(a,b){return b.d-a.d});
    if (sbl.length > 0) {

function renderCbPriceHistory(code) {

// ========== 資料載入 ==========
async function loadData() {
  var b64 = DATA_B64;
  var binary = atob(b64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  var ds = new DecompressionStream('gzip');
  var writer = ds.writable.getWriter();
  writer.write(bytes); writer.close();
  var reader = ds.readable.getReader();
  var chunks = [];
  while (true) { var r = await reader.read(); if (r.done) break; chunks.push(r.value); }
  var total = chunks.reduce(function(a,c){return a+c.length},0);
  var result = new Uint8Array(total);
  var offset = 0;
  for (var j = 0; j < chunks.length; j++) { result.set(chunks[j], offset); offset += chunks[j].length; }
  var text = new TextDecoder().decode(result);
  DB = JSON.parse(text);
  DB._cbByCode = {};
  DB.cb.forEach(function(cb){DB._cbByCode[cb.c]=cb});
  DB._kbByCode = {};
  DB.kb.forEach(function(k){DB._kbByCode[k.c]=k});
  DB._indByCode = DB.ind;
  var m = DB.meta;
  document.getElementById('ctx-cb').textContent = 'CB 資料庫 (' + m.cb_total + ' 檔)';
  document.getElementById('ctx-cbas').textContent = 'CBAS 拆解 (' + DB.cbas.length + ' 筆/近10日)';
  document.getElementById('ctx-stock').textContent = '股價資料 (' + DB.sp.length + ' 筆/近5日)';
  document.getElementById('ctx-auction').textContent = '競拍資料 (' + (window.AUCTION?AUCTION.length:0) + ' 筆)';
  if(window.CB_IMPORT) document.getElementById('db-stats').innerHTML += '<div>CB完整資料: '+Object.keys(CB_IMPORT).length+'檔/46欄</div>';
  document.getElementById('subtitle-meta').textContent = '資料庫 ' + m.cb_total + ' 檔 / 掛牌 ' + DB.kb.length + ' 檔 / 資料至 ' + fmtDate(m.kanban_date);
}

// ========== 查詢引擎 ==========
function doQuery(q) {
  var input = document.getElementById('query-input');
  var query = q || input.value.trim();
  if (!query) return;
  input.value = '';
  if (!DB) { addSystemMsg('資料庫載入中，請稍候...'); return; }
  var w = document.getElementById('welcome');
  if (w) w.style.display = 'none';
  addUserMsg(query);
  addRecent(query);
  
  // 特殊查詢路由
  if (query === '掛牌中') return showListedSummary();
  if (query === '競拍總覽') return showAuctionSummary();
  if (query === '產業總覽') return showIndustrySummary();
  if (query === '研究發現') return showResearchFindings();
  if (query === '甜蜜點篩選') return showSweetSpotFilter();
  
  // 搜尋
  var results = search(query);
  if (results.length === 0) { addSystemMsg('找不到「' + query + '」相關資料，請確認代號或名稱是否正確。'); return; }
  
  // 智慧呈現：不管在哪個Tab，都一次顯示全部
  var r = results[0];
  if (r.type === 'stock') showStockResult(r);
  else showCbFullResult(r); // 統一用完整呈現
}

function search(query) {
  var q = query.trim(), results = [];
  var isDigit = /^\d+$/.test(q);
  var len = q.length;
  
  // 核心邏輯：4位數=股票，5位數=CB
  if (isDigit && len === 5) {
    // 5位數：優先當CB代號
    if (DB._cbByCode[q]) { results.push({type:'cb',code:q,data:DB._cbByCode[q]}); return results; }
    if (DB._kbByCode[q]) { results.push({type:'cb',code:q,data:DB._cbByCode[q]||null,kanban:DB._kbByCode[q]}); return results; }
    if (window.AUCTION) { var am=AUCTION.filter(function(a){return a.cc===q}); if(am.length>0){results.push({type:'cb',code:q,data:DB._cbByCode[q]||{c:q,n:am[0].n,s:am[0].sc,r:am[0].tcri,g:am[0].guar,m:'競拍'},auction:am[0]});return results;}}
  }
  
  if (isDigit && len === 4) {
    // 4位數：優先當股票代號，顯示股票基本資料
    var sp = DB.sp.filter(function(s){return String(s.c)===q});
    var indExists = window.IND_FULL && IND_FULL[q];
    if (sp.length > 0 || indExists) {
      results.push({type:'stock',code:q,data:sp,name:sp.length>0?sp[0].n:(indExists?IND_FULL[q].n:'')});
      return results;
    }
  }
  
  // 其他長度的數字（如6位數舊CB代號）
  if (isDigit) {
    if (DB._cbByCode[q]) { results.push({type:'cb',code:q,data:DB._cbByCode[q]}); return results; }
    if (DB._kbByCode[q]) { results.push({type:'cb',code:q,data:DB._cbByCode[q]||null,kanban:DB._kbByCode[q]}); return results; }
    var sp2 = DB.sp.filter(function(s){return String(s.c)===q});
    if (sp2.length > 0) { results.push({type:'stock',code:q,data:sp2,name:sp2[0].n}); return results; }
  }
  
  // 名稱搜尋
  var nm = DB.cb.filter(function(cb){return cb.n.includes(q)});
  if (nm.length > 0) { results.push({type:'cb',code:nm[0].c,data:nm[0],relatedCbs:nm.length>1?nm:null}); return results; }
  var snm = DB.sp.filter(function(s){return s.n&&s.n.includes(q)});
  if (snm.length > 0) { var codes=[...new Set(snm.map(function(s){return String(s.c)}))]; results.push({type:'stock',code:codes[0],data:snm.filter(function(s){return String(s.c)===codes[0]}),name:snm[0].n}); return results; }
  var kn = DB.kb.filter(function(k){return k.n.includes(q)});
  if (kn.length > 0) { results.push({type:'cb',code:kn[0].c,data:DB._cbByCode[kn[0].c]||null,kanban:kn[0]}); return results; }
  // 產業整合資料庫名稱搜尋
  if (window.IND_FULL) { for(var c in IND_FULL){if(IND_FULL[c].n&&IND_FULL[c].n.includes(q)){var sp3=DB.sp.filter(function(s){return String(s.c)===c});results.push({type:'stock',code:c,data:sp3,name:IND_FULL[c].n});return results;}}}
  return results;
}

  // === 知識庫提醒 ===

  var rp = kb ? kb.rp : 0;
  if (rp >= 130) alerts.push({t:'⚠️ 高價風險區 ('+fmtNum(rp)+'元)', d:'130元以上虧>20%機率22-25%，需嚴格停利', level:'danger'});
  else if (rp >= 110 && rp < 130) alerts.push({t:'📊 中性區間 ('+fmtNum(rp)+'元)', d:'110-130元風險適中，注意市場環境判斷', level:'info'});
  else if (rp > 0 && rp < 100) alerts.push({t:'✅ 安全邊際 ('+fmtNum(rp)+'元)', d:'100元以下有債券面值保護，風險報酬比優', level:'ok'});
  
  if (kb && kb.cp>0 && kb.sp>0) {
    var cv2 = (kb.sp/kb.cp)*100;
    var prem2 = ((kb.rp/cv2)-1)*100;
    if (prem2 > 30) alerts.push({t:'⚠️ 高溢價 '+fmtNum(prem2)+'%', d:'溢價率偏高，下檔空間較大', level:'warn'});
    else if (prem2 < 5 && prem2 > -5) alerts.push({t:'🎯 接近平價 '+fmtNum(prem2)+'%', d:'轉換價值接近，套利空間大', level:'ok'});
  }
  
  if (cb && cb.r) {
    var tcri = cb.r.replace(/[^0-9]/g, '');
    if (tcri === '6') alerts.push({t:'⚠️ TCRI 6 高風險', d:'低信評CB歸零率顯著偏高', level:'danger'});
    else if (tcri==='4'||tcri==='5') alerts.push({t:'📊 TCRI '+tcri+' 歷史表現佳', d:'4-5分歷史報酬優於更高和更低評等', level:'info'});
  }
  
  if (cb && cb.g === '有擔保') alerts.push({t:'✅ 有擔保', d:'有擔保CB歸零率僅為無擔保的1/5.5', level:'ok'});
  
  // CBAS 風險提醒
  if (allCbasForThis && allCbasForThis.length > 0) {
    var avgPrem = allCbasForThis.reduce(function(s,r){return s+r.avg},0)/allCbasForThis.length;
    if (avgPrem <= 10 && avgPrem >= 5) alerts.push({t:'🍯 CBAS甜蜜點區間', d:'權利金平均'+fmtNum(avgPrem)+'元，槓桿10-20倍', level:'ok'});
  }
  
  if (alerts.length > 0) {
    var levelMap = {danger:'rp-danger',warn:'rp-warn',ok:'rp-ok',info:'rp-info'};
    html += '<div class="data-section"><div class="section-title">📚 知識庫提醒</div>';
    alerts.forEach(function(a){html+='<div class="rp-card '+(levelMap[a.level]||'rp-info')+'" style="margin-bottom:4px"><div class="card-t">'+a.t+'</div><div class="card-d">'+a.d+'</div></div>';});
    html += '<div style="font-size:10px;color:var(--text4);margin-top:4px">提醒：CBAS最大損失為權利金歸零，請做好資金比例控管</div>';
    html += '</div>';
  }
  
  html += '</div>';
  addSystemCard(html);
}

function renderYtVideos() {

async function loadCbImport() {
  if (!window.CB_IMPORT_B64) return;
  try {
    var binary = atob(CB_IMPORT_B64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    var ds = new DecompressionStream('gzip');
    var writer = ds.writable.getWriter();
    writer.write(bytes); writer.close();
    var reader = ds.readable.getReader();
    var chunks = [];
    while (true) { var r = await reader.read(); if (r.done) break; chunks.push(r.value); }
    var total = chunks.reduce(function(a,c){return a+c.length},0);
    var result = new Uint8Array(total);
    var offset = 0;
    for (var j = 0; j < chunks.length; j++) { result.set(chunks[j], offset); offset += chunks[j].length; }
    var text = new TextDecoder().decode(result);
    window.CB_IMPORT = JSON.parse(text);
    window.CB_IMPORT_B64 = null;
  } catch(e) {
    console.error('CB Import load error:', e);
  }
}


async function decompressB64(b64str) {
  var binary = atob(b64str);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  var ds = new DecompressionStream('gzip');
  var writer = ds.writable.getWriter();
  writer.write(bytes); writer.close();
  var reader = ds.readable.getReader();
  var chunks = [];
  while (true) { var r = await reader.read(); if (r.done) break; chunks.push(r.value); }
  var total = chunks.reduce(function(a,c){return a+c.length},0);
  var result = new Uint8Array(total);
  var offset = 0;
  for (var j = 0; j < chunks.length; j++) { result.set(chunks[j], offset); offset += chunks[j].length; }
  return JSON.parse(new TextDecoder().decode(result));
}
