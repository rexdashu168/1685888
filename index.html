<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex CB-Smart 戰情室 (自動連線版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* CSS 樣式維持高質感暗色系 */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #2d2d2d;
            --primary: #00d4ff;
            --accent: #2962ff;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --danger: #ff5252;
            --success: #00e676;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            height: 60px;
            background: linear-gradient(90deg, #0d47a1 0%, #1565c0 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: #333;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-badge.online { background: rgba(0, 230, 118, 0.2); color: var(--success); border: 1px solid var(--success); }
        .status-badge.error { background: rgba(255, 82, 82, 0.2); color: var(--danger); border: 1px solid var(--danger); }

        .controls { display: flex; align-items: center; gap: 15px; }

        .date-picker-box {
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-input {
            background: transparent; border: none; color: #fff;
            font-family: inherit; outline: none; color-scheme: dark; font-size: 0.95rem;
        }

        /* --- Main Layout --- */
        .main-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* --- Left Panel --- */
        .left-panel {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }

        .search-box { position: relative; }
        .search-input {
            width: 100%; padding: 12px 16px; padding-left: 40px;
            background: var(--bg-hover); border: 1px solid var(--border);
            border-radius: 8px; color: #fff; font-size: 1rem; outline: none;
        }
        .search-input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }

        .cb-card {
            background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border);
            overflow: hidden; display: none; animation: slideIn 0.3s ease;
        }
        .cb-card.active { display: block; }

        .card-header { padding: 15px; background: linear-gradient(135deg, rgba(41,98,255,0.2), rgba(0,212,255,0.1)); border-bottom: 1px solid var(--border); }
        .cb-title { font-size: 1.3rem; font-weight: 700; color: #fff; }
        .cb-code { font-size: 1rem; color: var(--primary); font-family: monospace; }
        .cb-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.1); color: var(--text-sub); }
        .tag.risk { background: rgba(255, 82, 82, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .tag.safe { background: rgba(0, 230, 118, 0.2); color: var(--success); border: 1px solid var(--success); }

        .card-body { padding: 15px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .data-item { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; }
        .data-label { font-size: 0.75rem; color: var(--text-sub); }
        .data-value { font-size: 0.95rem; font-weight: 500; color: #fff; }
        .val-up { color: var(--danger); }
        .val-down { color: var(--success); }

        /* --- Right Panel --- */
        .right-panel {
            padding: 20px; display: flex; flex-direction: column; overflow: hidden; background: #121212;
            position: relative;
        }
        
        .dashboard-tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-sub);
            padding: 6px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem;
        }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: 700; border-color: var(--primary); }

        .table-container { flex: 1; overflow: auto; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        thead { position: sticky; top: 0; background: #252525; z-index: 10; }
        th { text-align: left; padding: 10px 14px; color: var(--text-sub); border-bottom: 2px solid var(--border); white-space: nowrap; }
        td { padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; color: var(--text-main); }
        tr:hover { background: rgba(255,255,255,0.05); cursor: pointer; }

        /* --- Diagnostics & Loading --- */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 50;
            display: none; justify-content: center; align-items: center; flex-direction: column;
        }
        .progress-bar-container { width: 300px; height: 6px; background: #333; border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        
        .error-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2a0000; border: 1px solid var(--danger); padding: 30px;
            border-radius: 12px; text-align: center; max-width: 500px; display: none; z-index: 60;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="statusBadge" style="position:fixed; bottom:20px; right:20px; z-index:999;" class="status-badge">
        <i class="fa-solid fa-circle-notch fa-spin"></i> 初始化中...
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <i class="fa-solid fa-satellite-dish fa-bounce" style="font-size: 3rem; color: var(--primary);"></i>
        <div class="progress-bar-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="loadingText" style="margin-top:10px; color:#ccc;">正在連線資料庫...</div>
    </div>

    <div id="errorBox" class="error-box">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: var(--danger); margin-bottom: 15px;"></i>
        <h3 style="color: #fff; margin-bottom: 10px;">無法讀取資料</h3>
        <p id="errorMsg" style="color: #ccc; margin-bottom: 20px;">找不到檔案</p>
        <div style="text-align: left; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; font-size: 0.9rem; color: #aaa;">
            <p>請檢查 GitHub 設定：</p>
            <ol style="margin-left: 20px; margin-top: 5px;">
                <li>檔案名稱是否為 <span style="color:#fff;" id="expectedFilename"></span>？</li>
                <li>檔案是否已上傳到 GitHub？</li>
            </ol>
        </div>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 8px 20px; background: var(--primary); border: none; border-radius: 4px; cursor: pointer;">重試</button>
    </div>

    <header class="header">
        <div class="brand">
            <i class="fa-solid fa-network-wired"></i> Rex 戰情室
        </div>
        <div class="controls">
            <div class="date-picker-box">
                <i class="fa-regular fa-calendar"></i>
                <input type="date" id="datePicker" class="date-input" onchange="manualDateChange()">
            </div>
            <input type="file" id="fileInput" accept=".xlsx" style="display:none;" onchange="handleManualUpload(event)">
            <button onclick="document.getElementById('fileInput').click()" style="background:transparent; border:1px solid #444; color:#aaa; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:0.8rem;">
                手動上傳
            </button>
        </div>
    </header>

    <div class="main-container">
        <aside class="left-panel">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="輸入代碼 (如: 68072)" onkeypress="if(event.key==='Enter') smartSearch()">
            </div>
            <div id="superCard" class="cb-card"></div>
            <div id="welcomeMsg" style="text-align: center; color: #555; margin-top: 50px;">
                <i class="fa-solid fa-database" style="font-size: 3rem; margin-bottom: 10px;"></i>
                <p>資料庫已連線</p>
            </div>
        </aside>

        <main class="right-panel">
            <div class="dashboard-tabs" id="tabContainer">
                <button class="tab-btn active" onclick="switchView('strategy')">智能選股</button>
            </div>
            <div id="strategyView" style="padding: 20px; text-align: center;">
                <div style="margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
                    <button class="tab-btn" onclick="runStrategy('high_leverage')">🔥 高槓桿 ASO</button>
                    <button class="tab-btn" onclick="runStrategy('risk_alert')">⚠️ 風險警示</button>
                    <button class="tab-btn" onclick="runStrategy('near_maturity')">⏳ 即將到期</button>
                </div>
                <div id="strategyResult"></div>
            </div>
            <div id="tableContainer" class="table-container" style="display:none;">
                <table id="mainTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- 核心變數 ---
        let fullDB = {};
        let sheetList = [];
        let categorizedSheets = { quote: null, risk: [] };

        // --- 1. 網頁啟動：自動執行 ---
        window.onload = function() {
            // 設定今日日期
            const now = new Date();
            // 處理時區問題，確保是當地時間的 YYYY-MM-DD
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const todayStr = `${year}-${month}-${day}`;
            
            document.getElementById('datePicker').value = todayStr;

            // 立即觸發載入
            console.log("系統啟動，嘗試載入日期:", todayStr);
            loadDataByDate(todayStr);
        };

        function manualDateChange() {
            const date = document.getElementById('datePicker').value;
            loadDataByDate(date);
        }

        // --- 2. 智慧載入邏輯 (Smart Load) ---
        function loadDataByDate(dateStr) {
            if(!dateStr) return;

            // 檔名格式化: 2025-11-26 -> 20251126.xlsx
            const filename = dateStr.replace(/-/g, '') + '.xlsx';
            
            // UI 狀態更新
            updateStatus('loading', `正在搜尋: ${filename}`);
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('errorBox').style.display = 'none';

            // 雙重路徑偵測：先找 data/，失敗找 ./
            const pathData = `./data/${filename}`;
            const pathRoot = `./${filename}`;

            // 嘗試路徑 1
            fetch(pathData).then(res => {
                if(res.ok) return res.arrayBuffer();
                throw new Error("data資料夾找不到");
            }).then(data => {
                // 成功載入
                processExcel(data);
            }).catch(err1 => {
                console.log("data 資料夾讀取失敗，嘗試根目錄...");
                // 嘗試路徑 2 (根目錄)
                fetch(pathRoot).then(res => {
                    if(res.ok) return res.arrayBuffer();
                    throw new Error("根目錄也找不到");
                }).then(data => {
                    processExcel(data);
                }).catch(err2 => {
                    // 真的找不到了
                    showError(filename, "兩個路徑都找不到檔案");
                });
            });
        }

        // --- 3. Excel 處理 (分批讀取防當機) ---
        async function processExcel(buffer) {
            try {
                updateStatus('loading', '正在解析 Excel...');
                const workbook = XLSX.read(buffer, {type: 'array'});
                sheetList = workbook.SheetNames;
                fullDB = {};
                categorizedSheets = { quote: null, risk: [] };

                const total = sheetList.length;
                
                for(let i=0; i<total; i++) {
                    const name = sheetList[i];
                    // 更新進度條
                    document.getElementById('progressBar').style.width = `${(i/total)*100}%`;
                    document.getElementById('loadingText').textContent = `讀取中: ${name}`;
                    
                    // 防卡死延遲
                    await new Promise(r => setTimeout(r, 5));

                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
                    // 欄位去空白
                    const cleanData = jsonData.map(row => {
                        const newRow = {};
                        for(let k in row) newRow[k.trim()] = row[k];
                        return newRow;
                    });

                    fullDB[name] = cleanData;

                    // 簡單分類
                    if(cleanData.length > 0) {
                        const keys = Object.keys(cleanData[0]).join(',');
                        if(keys.includes('Delta')) categorizedSheets.quote = name;
                        if(keys.includes('停止') || keys.includes('贖回')) categorizedSheets.risk.push(name);
                    }
                }

                // 完成
                document.getElementById('loadingOverlay').style.display = 'none';
                updateStatus('online', `已連線: ${sheetList.length} 個資料表`);
                initTabs();

            } catch (e) {
                console.error(e);
                showError("未知", "檔案解析失敗 (格式錯誤?)");
            }
        }

        // --- 輔助功能 ---
        function updateStatus(type, msg) {
            const badge = document.getElementById('statusBadge');
            badge.className = `status-badge ${type}`;
            badge.innerHTML = type === 'loading' 
                ? `<i class="fa-solid fa-circle-notch fa-spin"></i> ${msg}`
                : `<i class="fa-solid fa-check-circle"></i> ${msg}`;
        }

        function showError(filename, reason) {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('expectedFilename').textContent = filename;
            document.getElementById('errorMsg').textContent = `原因: ${reason}`;
            updateStatus('error', '連線失敗');
        }

        function handleManualUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => processExcel(evt.target.result);
            reader.readAsArrayBuffer(file);
        }

        // --- 介面邏輯 (Tabs & Search) ---
        function initTabs() {
            const con = document.getElementById('tabContainer');
            con.innerHTML = `<button class="tab-btn active" onclick="switchView('strategy')">智能選股</button>`;
            sheetList.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.textContent = s;
                btn.onclick = () => showTable(s);
                con.appendChild(btn);
            });
        }

        function showTable(sheetName) {
            document.getElementById('strategyView').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            // Highlight current tab (simple logic)
            
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHead');
            const data = fullDB[sheetName];

            if(!data || data.length === 0) {
                tbody.innerHTML = '<tr><td>無資料</td></tr>';
                return;
            }

            const cols = Object.keys(data[0]);
            thead.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
            tbody.innerHTML = data.slice(0, 50).map(r => `
                <tr onclick="smartSearch('${r['CB代碼']||r['代碼']||''}')">
                    ${cols.map(c => `<td>${r[c]||''}</td>`).join('')}
                </tr>
            `).join('');
        }

        function switchView(mode) {
            if(mode === 'strategy') {
                document.getElementById('strategyView').style.display = 'block';
                document.getElementById('tableContainer').style.display = 'none';
            }
        }

        function smartSearch(forceCode) {
            const key = (forceCode || document.getElementById('searchInput').value).trim().toUpperCase();
            if(!key) return;

            let result = { code: key, name: '', price: '-', delta: '-', risk: [] };
            let found = false;

            for(let name in fullDB) {
                const row = fullDB[name].find(r => {
                    const str = JSON.stringify(r).toUpperCase();
                    return str.includes(`"${key}"`) || str.includes(`${key}`);
                });
                if(row) {
                    found = true;
                    if(row['名稱'] || row['商品']) result.name = row['名稱'] || row['商品'];
                    if(row['收盤'] || row['成交']) result.price = row['收盤'] || row['成交'];
                    if(row['Delta']) result.delta = row['Delta'];
                    if(categorizedSheets.risk.includes(name)) result.risk.push(name);
                }
            }

            if(found) {
                document.getElementById('welcomeMsg').style.display = 'none';
                const card = document.getElementById('superCard');
                card.classList.add('active');
                card.innerHTML = `
                    <div class="card-header">
                        <div class="cb-title">${result.name || '未知名稱'}</div>
                        <div class="cb-code">${result.code}</div>
                        <div class="cb-tags">
                            ${result.risk.map(r => `<span class="tag risk">${r}</span>`).join('')}
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="data-grid">
                            <div class="data-item"><div class="data-label">價格</div><div class="data-value">${result.price}</div></div>
                            <div class="data-item"><div class="data-label">Delta</div><div class="data-value">${result.delta}</div></div>
                        </div>
                    </div>
                `;
            } else {
                alert("查無此代碼資料");
            }
        }

        function runStrategy(type) {
            const res = document.getElementById('strategyResult');
            if(!categorizedSheets.quote) {
                res.innerHTML = "找不到報價單，無法分析";
                return;
            }
            const data = fullDB[categorizedSheets.quote];
            let list = [];
            
            if(type === 'high_leverage') {
                list = data.filter(r => parseFloat(r['Delta']) > 0.6 && parseFloat(r['買價']) < 20);
            } else if (type === 'risk_alert') {
                categorizedSheets.risk.forEach(s => {
                    fullDB[s].forEach(r => list.push({...r, _note: s}));
                });
            } else if (type === 'near_maturity') {
                 // 需有到期日欄位邏輯，此處簡化
                 res.innerHTML = "需搭配到期日資料表";
                 return;
            }

            if(list.length === 0) {
                res.innerHTML = "無符合條件標的";
                return;
            }

            let html = '<table style="width:100%; text-align:left;"><tr><th>代碼</th><th>名稱</th><th>數值</th></tr>';
            list.slice(0, 20).forEach(r => {
                html += `<tr style="border-bottom:1px solid #333; cursor:pointer;" onclick="smartSearch('${r['CB代碼']||r['代碼']}')">
                    <td style="padding:8px;">${r['CB代碼']||r['代碼']}</td>
                    <td>${r['名稱']||r['商品']||'-'}</td>
                    <td style="color:var(--primary)">${r['Delta'] || r._note || '-'}</td>
                </tr>`;
            });
            html += '</table>';
            res.innerHTML = html;
        }
    </script>
</body>
</html>
