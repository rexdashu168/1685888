<script>
    let allData = [];
    let filteredData = [];
    let currentPage = 1;
    let sortColumn = null;
    let sortDirection = 'asc';
    let columns = [];

    const priorityColumns = [
        '排序', '代碼', '股票名稱', '產業分類', '收盤價', '漲幅%', 
        '成交量', '成交值(億)', '週轉率', '當沖率',
        '外資', '投信', '主力', '散戶', '融資增減', '融券'
    ];

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('reportType').addEventListener('change', loadData);
        document.getElementById('searchInput').addEventListener('input', debounce(filterData, 300));
        document.getElementById('pageSize').addEventListener('change', renderTable);
        loadData();
    });

    function loadData() {
        const filename = document.getElementById('reportType').value;
        const tableBody = document.getElementById('tableBody');
        const tableHead = document.getElementById('tableHead');
        
        tableBody.innerHTML = '<tr><td colspan="20" class="loading">載入資料中</td></tr>';
        tableHead.innerHTML = '';
        
        Papa.parse(filename, {
            download: true,
            encoding: 'big5',
            skipEmptyLines: true,
            complete: function(results) {
                processData(results.data);
            },
            error: function(error) {
                tableBody.innerHTML = `<tr><td colspan="20" style="text-align:center;padding:50px;color:#c53030;">
                    載入失敗：請確認 ${filename} 檔案存在於同目錄
                </td></tr>`;
            }
        });
    }

    function processData(rawData) {
        let headerIndex = 0;
        for (let i = 0; i < Math.min(10, rawData.length); i++) {
            const row = rawData[i];
            if (row && (row.includes('代碼') || row.includes('排序') || row.includes('股票名稱'))) {
                headerIndex = i;
                break;
            }
        }
        
        columns = rawData[headerIndex].map(col => col ? col.trim().replace(/\n/g, '') : '');
        
        let dataDate = '未知';
        for (let i = 0; i < headerIndex; i++) {
            const row = rawData[i].join(' ');
            const dateMatch = row.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
            if (dateMatch) {
                dataDate = `${dateMatch[1]}/${dateMatch[2]}/${dateMatch[3]}`;
                break;
            }
        }
        document.getElementById('dataDate').textContent = dataDate;
        
        allData = [];
        for (let i = headerIndex + 1; i < rawData.length; i++) {
            const row = rawData[i];
            if (!row || row.length < 3) continue;
            
            const firstCell = String(row[0] || '').trim();
            if (!firstCell || isNaN(parseInt(firstCell))) continue;
            
            const rowObj = {};
            columns.forEach((col, idx) => {
                if (col) {
                    let value = row[idx] !== undefined ? String(row[idx]).trim() : '';
                    if (value.match(/^\([\d,.]+\)$/)) {
                        value = '-' + value.replace(/[()]/g, '');
                    }
                    rowObj[col] = value;
                }
            });
            allData.push(rowObj);
        }
        
        filteredData = [...allData];
        currentPage = 1;
        updateStats();
        renderTable();
    }

    function updateStats() {
        const data = filteredData;
        document.getElementById('totalCount').textContent = data.length;
        
        const changeCol = columns.find(c => c.includes('漲幅') || c.includes('漲跌'));
        
        let up = 0, down = 0, flat = 0;
        data.forEach(row => {
            const val = parseFloat(row[changeCol]) || 0;
            if (val > 0) up++;
            else if (val < 0) down++;
            else flat++;
        });
        
        document.getElementById('upCount').textContent = up;
        document.getElementById('downCount').textContent = down;
        document.getElementById('flatCount').textContent = flat;
    }

    function filterData() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        
        if (!keyword) {
            filteredData = [...allData];
        } else {
            filteredData = allData.filter(row => {
                const code = String(row['代碼'] || '').toLowerCase();
                const name = String(row['股票名稱'] || '').toLowerCase();
                return code.includes(keyword) || name.includes(keyword);
            });
        }
        
        currentPage = 1;
        updateStats();
        renderTable();
    }

    function sortData(column) {
        if (sortColumn === column) {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
            sortColumn = column;
            sortDirection = 'desc';
        }
        
        filteredData.sort((a, b) => {
            let valA = a[column] || '';
            let valB = b[column] || '';
            
            const numA = parseFloat(String(valA).replace(/,/g, ''));
            const numB = parseFloat(String(valB).replace(/,/g, ''));
            
            if (!isNaN(numA) && !isNaN(numB)) {
                return sortDirection === 'asc' ? numA - numB : numB - numA;
            }
            
            return sortDirection === 'asc' 
                ? String(valA).localeCompare(String(valB))
                : String(valB).localeCompare(String(valA));
        });
        
        renderTable();
    }

    function renderTable() {
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const pageSize = document.getElementById('pageSize').value;
        
        const sortedColumns = [...columns].sort((a, b) => {
            const idxA = priorityColumns.findIndex(p => a.includes(p));
            const idxB = priorityColumns.findIndex(p => b.includes(p));
            if (idxA === -1 && idxB === -1) return 0;
            if (idxA === -1) return 1;
            if (idxB === -1) return -1;
            return idxA - idxB;
        });
        
        const displayColumns = sortedColumns.slice(0, 20);
        
        tableHead.innerHTML = '<tr>' + displayColumns.map(col => {
            const sortClass = sortColumn === col 
                ? (sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc') 
                : '';
            return `<th class="${sortClass}" onclick="sortData('${col}')">${col}</th>`;
        }).join('') + '</tr>';
        
        const total = filteredData.length;
        const size = pageSize === 'all' ? total : parseInt(pageSize);
        const totalPages = Math.ceil(total / size);
        const start = (currentPage - 1) * size;
        const end = start + size;
        const pageData = filteredData.slice(start, end);
        
        tableBody.innerHTML = pageData.map(row => {
            const changeCol = columns.find(c => c.includes('漲幅'));
            const change = parseFloat(row[changeCol]) || 0;
            const rowClass = change > 0 ? 'highlight' : '';
            
            return `<tr class="${rowClass}">` + displayColumns.map(col => {
                let value = row[col] || '';
                let className = '';
                
                const num = parseFloat(String(value).replace(/,/g, ''));
                if (!isNaN(num)) {
                    if (col.includes('漲幅') || col.includes('漲跌')) {
                        className = num > 0 ? 'positive' : (num < 0 ? 'negative' : '');
                        value = num > 0 ? `+${value}` : value;
                    } else if (col.includes('外資') || col.includes('投信') || col.includes('主力') || col.includes('融資')) {
                        className = num > 0 ? 'positive' : (num < 0 ? 'negative' : '');
                    }
                }
                
                return `<td class="${className}">${value}</td>`;
            }).join('') + '</tr>';
        }).join('') || '<tr><td colspan="20" style="text-align:center;padding:30px;">無符合條件的資料</td></tr>';
        
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const pagination = document.getElementById('pagination');
        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }
        
        let html = '';
        html += `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首頁</button>`;
        html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>`;
        
        const start = Math.max(1, currentPage - 2);
        const end = Math.min(totalPages, currentPage + 2);
        
        for (let i = start; i <= end; i++) {
            html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
        
        html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>`;
        html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末頁</button>`;
        html += `<span style="margin-left:10px;color:#666;">第 ${currentPage} / ${totalPages} 頁</span>`;
        
        pagination.innerHTML = html;
    }

    function goToPage(page) {
        currentPage = page;
        renderTable();
        document.querySelector('.table-container').scrollIntoView({ behavior: 'smooth' });
    }

    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }
</script>
